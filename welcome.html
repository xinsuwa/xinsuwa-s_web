<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心诉哇的小窝</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #fdfcfa;
            --text: #2d2a26;
            --muted: #8b8680;
            --accent: #d4a574;
            --warm: #e8c098;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1816;
                --text: #f0ebe3;
                --muted: #a8a29a;
                --accent: #d4a574;
                --warm: #c4956a;
            }
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Canvas 背景 */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 主页 */
        .page-home {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .container { max-width: 600px; width: 100%; }

        header { margin-bottom: 48px; }

        .name {
            font-family: 'Noto Serif SC', serif;
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            line-height: 1.2;
            display: inline-block;
        }

        .name .char {
            display: inline-block;
            transform-origin: center bottom;
            will-change: transform;
        }

        .tagline { font-size: 1.1rem; color: var(--muted); font-weight: 400; }
        .about { margin-bottom: 56px; }
        .about-text { font-size: 1rem; color: var(--text); line-height: 1.8; }
        .about-text .word { display: inline-block; }

        /* 悬浮时钟 */
        .floating-clock {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 20px;
            border: 1px solid var(--warm);
            z-index: 100;
        }

        .floating-clock .clock-time {
            font-size: 1.5rem;
            font-weight: 600;
            font-family: 'Noto Serif SC', serif;
            margin-bottom: 5px;
        }

        .floating-clock .clock-date { font-size: 0.9rem; color: var(--muted); }

        /* 抽屉菜单触发按钮 */
        .drawer-trigger {
            position: fixed;
            top: 24px;
            left: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--warm));
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(212, 165, 116, 0.3);
        }

        .drawer-trigger:hover { transform: scale(1.1); box-shadow: 0 6px 30px rgba(212, 165, 116, 0.5); }
        .drawer-trigger svg { width: 24px; height: 24px; stroke: white; stroke-width: 2; fill: none; }

        /* 抽屉覆盖层 */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            opacity: 0;
            pointer-events: none;
            z-index: 95;
        }

        .drawer-overlay.visible { opacity: 1; pointer-events: auto; }

        /* 抽屉菜单 */
        .drawer-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background: var(--bg);
            box-shadow: 4px 0 30px rgba(0, 0, 0, 0.15);
            z-index: 96;
            transform: translateX(-100%);
            padding: 80px 24px 24px;
        }

        .drawer-menu.visible { transform: translateX(0); }

        .drawer-header {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 32px;
            color: var(--text);
        }

        .drawer-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 18px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .drawer-item:hover {
            background: rgba(212, 165, 116, 0.1);
        }

        .drawer-item-icon {
            font-size: 1.5rem;
        }

        .drawer-item-text {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text);
        }

        /* 功能面板 */
        .panels-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 90;
            pointer-events: none;
        }

        .panel-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            opacity: 0;
            pointer-events: none;
        }

        .panel-overlay.visible { opacity: 1; pointer-events: auto; }

        .panel-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(253, 252, 250, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            opacity: 0;
            border: 1px solid rgba(212, 165, 116, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .panel-overlay.visible .panel-content { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .panel-header {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: rgba(0, 0, 0, 0.05);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .panel-close:hover { background: rgba(0, 0, 0, 0.1); }
        .panel-close svg { width: 18px; height: 18px; stroke: var(--text); }

        /* 技能树 */
        .skills-grid { display: flex; flex-direction: column; gap: 16px; }

        .skill-item {
            background: rgba(0, 0, 0, 0.02);
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(212, 165, 116, 0.15);
        }

        .skill-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
        .skill-name { font-weight: 500; }
        .skill-percent { color: var(--accent); font-weight: 600; }

        .skill-bar { height: 6px; background: rgba(0, 0, 0, 0.06); border-radius: 3px; overflow: hidden; }
        .skill-fill { height: 100%; background: linear-gradient(90deg, var(--warm), var(--accent)); border-radius: 3px; width: 0; }

        /* 留言板 */
        .guestbook-wrapper {
            background: rgba(0, 0, 0, 0.02);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(212, 165, 116, 0.15);
        }

        .guestbook-form { display: flex; gap: 8px; margin-bottom: 16px; }

        .guestbook-input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 20px;
            border: 1px solid rgba(212, 165, 116, 0.3);
            background: var(--bg);
            font-size: 0.9rem;
            outline: none;
            color: var(--text);
        }

        .guestbook-submit {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .messages-list { max-height: 200px; overflow-y: auto; }

        .message-item {
            background: var(--bg);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 8px;
            font-size: 0.9rem;
            border: 1px solid rgba(212, 165, 116, 0.1);
        }

        .message-text { margin-bottom: 6px; line-height: 1.5; }
        .message-meta { font-size: 0.8rem; color: var(--muted); text-align: right; }

        /* 2048游戏样式 */
        .game2048-content { max-width: 420px !important; padding: 24px; }
        .game2048-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .game2048-score-box { background: #bbada0; padding: 8px 20px; border-radius: 8px; text-align: center; }
        .game2048-score-label { font-size: 0.85rem; color: #eee4da; font-weight: 600; }
        .game2048-score { font-size: 1.6rem; font-weight: 700; color: white; }
        .game2048-new-btn { background: #8f7a66; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.95rem; }
        .game2048-new-btn:hover { background: #9f8b77; }
        .game2048-container { position: relative; background: #bbada0; border-radius: 8px; padding: 10px; }
        .game2048-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .game2048-grid-cell { background: rgba(238, 228, 218, 0.35); border-radius: 6px; aspect-ratio: 1; }
        .game2048-tile-container { position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; }
        .game2048-tile { position: absolute; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.8rem; transition: all 0.15s ease; }
        .game2048-instructions { text-align: center; margin-top: 16px; color: var(--muted); font-size: 0.9rem; }

        /* 打地鼠游戏样式 */
        .whack-content { max-width: 420px !important; padding: 24px; }
        .whack-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .whack-score-box { background: #8b4513; padding: 8px 20px; border-radius: 8px; text-align: center; }
        .whack-score-label { font-size: 0.85rem; color: #f5deb3; font-weight: 600; }
        .whack-score { font-size: 1.6rem; font-weight: 700; color: white; }
        .whack-timer-box { background: #5a3d2b; padding: 8px 20px; border-radius: 8px; text-align: center; }
        .whack-new-btn { background: #8b4513; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.95rem; }
        .whack-new-btn:hover { background: #a0522d; }
        .whack-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; background: #8b6f47; padding: 16px; border-radius: 8px; }
        .whack-hole { aspect-ratio: 1; background: #3d2817; border-radius: 50%; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .whack-mole { font-size: 2.5rem; user-select: none; transition: transform 0.15s ease; position: absolute; bottom: -100%; }
        .whack-mole.active { bottom: 0; }
        .whack-instructions { text-align: center; margin-top: 16px; color: var(--muted); font-size: 0.9rem; }

        /* 贪吃蛇游戏样式 */
        .snake-content { max-width: 420px !important; padding: 24px; }
        .snake-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .snake-score-box { background: #2d5a3d; padding: 8px 20px; border-radius: 8px; }
        .snake-score-label { font-size: 0.85rem; color: #a8d5a8; font-weight: 600; }
        .snake-score { font-size: 1.6rem; font-weight: 700; color: white; }
        .snake-new-btn { background: #2d5a3d; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.95rem; }
        .snake-new-btn:hover { background: #3d7a4d; }
        .snake-container { position: relative; background: #1a2e1a; border-radius: 8px; padding: 10px; }
        .snake-canvas { display: block; margin: 0 auto; background: #1a2e1a; border-radius: 6px; }
        .snake-instructions { text-align: center; margin-top: 16px; color: var(--muted); font-size: 0.9rem; }

        /* 2048方块颜色 */
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.3); }
        .tile-256 { background: #edcc61; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.4); }
        .tile-512 { background: #edc850; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.5); }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.4rem; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.4rem; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.6); }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 1.2rem; }

        @media (prefers-color-scheme: dark) {
            .game2048-grid-cell { background: rgba(187, 173, 160, 0.35); }
        }

        /* 过渡动画 */
        .page-transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 9999;
            pointer-events: none;
            opacity: 1;
        }

        .page-transition-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2000px;
            height: 2000px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--warm) 0%, transparent 70%);
            transform: translate(-50%, -50%);
        }

        /* Responsive */
        @media (max-width: 640px) { .name { font-size: 2.2rem; } }

        @media (prefers-color-scheme: dark) {
            .skill-item, .guestbook-wrapper, .message-item { background: rgba(255, 255, 255, 0.03); }
            .panel-content { background: rgba(26, 24, 22, 0.98); }
        }
    </style>
</head>
<body data-barba="wrapper">
    <!-- Canvas 背景 -->
    <canvas id="canvas"></canvas>

    <!-- 过渡动画层 -->
    <div class="page-transition-overlay" id="transitionOverlay" data-barba="overlay">
        <div class="page-transition-glow" id="transitionGlow"></div>
    </div>

    <div class="page-home" data-barba="page">
        <div class="container">
            <header>
                <h1 class="name" id="title">心诉哇的小窝</h1>
                <p class="tagline" id="tagline">(*^▽^*)</p>
            </header>

            <section class="about" id="about">
                <p class="about-text" id="aboutText">这里是我分享和展示各种小项目的地方。一些实验、一些想法、一些玩物。</p>
            </section>
        </div>

        <!-- 悬浮时钟 -->
        <div class="floating-clock" id="floatingClock">

            <div class="clock-date" id="floatingClockDate">2024年1月1日</div>
        </div>

        <!-- 抽屉菜单触发按钮 -->
        <div class="drawer-trigger" id="drawerTrigger">
            <svg viewBox="0 0 24 24">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>

        <!-- 抽屉覆盖层 -->
        <div class="drawer-overlay" id="drawerOverlay"></div>

        <!-- 抽屉菜单 -->
        <div class="drawer-menu" id="drawerMenu">
            <div class="drawer-header">功能菜单</div>
            <div class="drawer-item" data-panel="skills">
                <span class="drawer-item-icon">🌱</span>
                <span class="drawer-item-text">技能树</span>
            </div>
            <div class="drawer-item" data-panel="guestbook">
                <span class="drawer-item-icon">💬</span>
                <span class="drawer-item-text">留言板</span>

            <div class="drawer-item" data-panel="game2048">

            </div>
            <div class="drawer-item" data-panel="whack">
                <span class="drawer-item-icon">🔨</span>
                <span class="drawer-item-text">打地鼠</span>
            </div>
            <div class="drawer-item" data-panel="snake">
                <span class="drawer-item-icon">🐍</span>
                <span class="drawer-item-text">贪吃蛇</span>
            </div>
            <div class="drawer-item drawer-external" data-url="game/index.html">
                <span class="drawer-item-icon">✨</span>
                <span class="drawer-item-text">微光探索者</span>
            </div>
            <div class="drawer-item drawer-external" data-url="https://eryuanka.github.io">
                <span class="drawer-item-icon">🔗</span>
                <span class="drawer-item-text">EryuanK</span>
            </div>

        <!-- 功能面板 -->
        <div class="panels-container" id="panelsContainer">
            <!-- 时钟面板 -->
            <div class="panel-overlay" id="clockPanel">
                <div class="panel-content">
                    <button class="panel-close" data-close>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                    <div class="panel-header">⏰ 当前时间</div>
                    <div style="text-align: center;">
                        <div id="panelClockTime" style="font-size: 3rem; font-weight: 600; font-family: 'Noto Serif SC', serif;">00:00:00</div>
                        <div id="panelClockDate" style="font-size: 1.2rem; margin-top: 10px;">2024年1月1日</div>
                    </div>
                </div>
            </div>

            <!-- 技能树面板 -->
            <div class="panel-overlay" id="skillsPanel">
                <div class="panel-content">
                    <button class="panel-close" data-close>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>

                    <div class="skills-grid">
                        <div class="skill-item">
                            <div class="skill-header">
                                <span class="skill-name">JavaScript</span>
                                <span class="skill-percent">85%</span>
                            </div>
                            <div class="skill-bar"><div class="skill-fill" data-width="85"></div></div>
                        </div>
                        <div class="skill-item">
                            <div class="skill-header">
                                <span class="skill-name">HTML/CSS</span>

                            </div>
                            <div class="skill-bar"><div class="skill-fill" data-width="90"></div></div>

                            <div class="skill-header">
                                <span class="skill-name">React</span>
                                <span class="skill-percent">75%</span>
                            </div>
                            <div class="skill-bar"><div class="skill-fill" data-width="75"></div></div>
                        </div>
                        <div class="skill-item">
                            <div class="skill-header">
                                <span class="skill-name">Node.js</span>
                                <span class="skill-percent">70%</span>
                            </div>
                            <div class="skill-bar"><div class="skill-fill" data-width="70"></div></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 留言板面板 -->
            <div class="panel-overlay" id="guestbookPanel">
                <div class="panel-content">
                    <button class="panel-close" data-close>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                    <div class="panel-header">💬 留言板</div>

                                </svg>

                        <div class="messages-list" id="messagesList"></div>
                    </div>
                </div>

            <!-- 2048游戏面板 -->
            <div class="panel-overlay" id="game2048Panel">
                <div class="panel-content game2048-content">
                    <button class="panel-close" data-close>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                    <div class="panel-header">🎮 2048</div>
                    <div class="game2048-header">

                        <div class="snake-score-box">

                        <button class="snake-new-btn" id="snakeNewBtn">重新开始</button>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script>
        /**
         * 心诉哇的小窝 - 主页
         */
        const elements = {
            canvas: document.getElementById('canvas'),
            transitionOverlay: document.getElementById('transitionOverlay'),
            transitionGlow: document.getElementById('transitionGlow'),
            title: document.getElementById('title'),
            tagline: document.getElementById('tagline'),
            about: document.getElementById('about'),
            aboutText: document.getElementById('aboutText'),
            floatingClock: document.getElementById('floatingClock'),
            floatingClockTime: document.getElementById('floatingClockTime'),
            floatingClockDate: document.getElementById('floatingClockDate'),
            panelClockTime: document.getElementById('panelClockTime'),
            panelClockDate: document.getElementById('panelClockDate'),
            messageInput: document.getElementById('messageInput'),
            sendBtn: document.getElementById('sendBtn'),
            messagesList: document.getElementById('messagesList'),
            drawerTrigger: document.getElementById('drawerTrigger'),
            drawerOverlay: document.getElementById('drawerOverlay'),
            drawerMenu: document.getElementById('drawerMenu'),
            drawerItems: document.querySelectorAll('.drawer-item'),
            panelsContainer: document.getElementById('panelsContainer'),
            game2048Grid: document.getElementById('game2048Grid'),
            game2048TileContainer: document.getElementById('game2048TileContainer'),
            game2048Score: document.getElementById('game2048Score'),
            game2048NewBtn: document.getElementById('game2048NewBtn')
        };

        let isDrawerOpen = false;
        let isHomeAnimating = false;

        // ========== Canvas ==========
        const canvasState = { ctx: null, shapes: [], revealed: false };

        class Shape {
            constructor() {
                this.reset();
            }
            reset() {
                this.type = Math.random();
                this.x = Math.random() * elements.canvas.width;
                this.y = Math.random() * elements.canvas.height;
                this.size = Math.random() * 50 + 25;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.008;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.baseOpacity = Math.random() * 0.08 + 0.03;
                this.opacity = 0;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
                if (this.x < -this.size * 2) this.x = elements.canvas.width + this.size;
                if (this.x > elements.canvas.width + this.size * 2) this.x = -this.size;
                if (this.y < -this.size * 2) this.y = elements.canvas.height + this.size;
                if (this.y > elements.canvas.height + this.size * 2) this.y = -this.size;
            }
            draw() {
                if (!canvasState.revealed) return;
                canvasState.ctx.save();
                canvasState.ctx.translate(this.x, this.y);
                canvasState.ctx.rotate(this.rotation);
                canvasState.ctx.globalAlpha = this.opacity;
                canvasState.ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
                canvasState.ctx.lineWidth = 1.5;
                if (this.type < 0.25) this.drawHouse();
                else if (this.type < 0.5) this.drawStar();
                else if (this.type < 0.75) this.drawCircle();
                else this.drawHeart();
                canvasState.ctx.restore();
            }
            drawHouse() {
                canvasState.ctx.beginPath();
                canvasState.ctx.moveTo(-this.size / 2, this.size / 3);
                canvasState.ctx.lineTo(-this.size / 2, -this.size / 6);
                canvasState.ctx.lineTo(0, -this.size / 2);
                canvasState.ctx.lineTo(this.size / 2, -this.size / 6);
                canvasState.ctx.lineTo(this.size / 2, this.size / 3);
                canvasState.ctx.closePath();
                canvasState.ctx.stroke();
            }
            drawStar() {
                canvasState.ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                    const x = Math.cos(angle) * this.size / 2;
                    const y = Math.sin(angle) * this.size / 2;
                    if (i === 0) canvasState.ctx.moveTo(x, y);
                    else canvasState.ctx.lineTo(x, y);
                }
                canvasState.ctx.closePath();
                canvasState.ctx.stroke();
            }
            drawCircle() {
                canvasState.ctx.beginPath();
                canvasState.ctx.arc(0, 0, this.size / 2.5, 0, Math.PI * 2);
                canvasState.ctx.stroke();
            }
            drawHeart() {
                canvasState.ctx.beginPath();
                canvasState.ctx.moveTo(0, this.size / 6);
                canvasState.ctx.bezierCurveTo(-this.size / 2, -this.size / 4, -this.size / 2, -this.size / 2, 0, -this.size / 4);
                canvasState.ctx.bezierCurveTo(this.size / 2, -this.size / 2, this.size / 2, -this.size / 4, 0, this.size / 6);
                canvasState.ctx.stroke();
            }
        }

        function resizeCanvas() {
            elements.canvas.width = window.innerWidth;
            elements.canvas.height = window.innerHeight;
        }

        function initCanvas() {
            canvasState.ctx = elements.canvas.getContext('2d');
            resizeCanvas();
            const shapeCount = Math.floor((elements.canvas.width * elements.canvas.height) / 35000);
            for (let i = 0; i < shapeCount; i++) {
                canvasState.shapes.push(new Shape());
            }
        }

        function animateCanvas() {
            canvasState.ctx.clearRect(0, 0, elements.canvas.width, elements.canvas.height);
            canvasState.shapes.forEach(shape => {
                shape.update();
                shape.draw();
            });
            requestAnimationFrame(animateCanvas);
        }

        function revealShapesGradually() {
            canvasState.revealed = true;
            const totalShapes = canvasState.shapes.length;
            let revealedCount = 0;
            const interval = setInterval(() => {
                if (revealedCount < totalShapes) {
                    canvasState.shapes[revealedCount].opacity = canvasState.shapes[revealedCount].baseOpacity;
                    revealedCount++;
                } else {
                    clearInterval(interval);
                }
            }, 50);
        }

        // ========== 主页动画 ==========
        function initializeTitleAnimation() {
            const titleText = elements.title.textContent;
            elements.title.innerHTML = '';
            titleText.split('').forEach(char => {
                const span = document.createElement('span');
                span.className = 'char';
                span.textContent = char;
                span.style.opacity = '0';
                span.style.transform = 'translateY(50px) scale(0.5)';
                elements.title.appendChild(span);
            });
        }

        function initializeAboutAnimation() {
            const text = elements.aboutText.textContent;
            elements.aboutText.innerHTML = '';
            text.split('').forEach(char => {
                const span = document.createElement('span');
                span.className = 'word';
                span.textContent = char === ' ' ? '\u00A0' : char;
                span.style.opacity = '0';
                span.style.transform = 'translateY(20px)';
                elements.aboutText.appendChild(span);
            });
        }

        function animateHomePageIn() {
            if (isHomeAnimating) return;
            isHomeAnimating = true;

            const tl = gsap.timeline();

            // 过渡光效消失
            tl.to(elements.transitionGlow, { width: 0, height: 0, opacity: 0, duration: 0.6, ease: 'power2.inOut' });
            tl.to(elements.transitionOverlay, { opacity: 0, duration: 0.3, ease: 'power2.out' }, '-=0.3');

            // 标题动画
            tl.fromTo('#title .char', 
                { opacity: 0, y: 50, rotation: -15, scale: 0.5 },
                { opacity: 1, y: 0, rotation: 0, scale: 1, duration: 0.7, ease: 'back.out(2)', stagger: 0.05 }
            );

            // 副标题
            tl.fromTo(elements.tagline, 
                { opacity: 0, y: 30, letterSpacing: 10 },
                { opacity: 1, y: 0, letterSpacing: 0, duration: 0.6, ease: 'back.out(1.5)' }, '-=0.3'
            );

            // 关于文字
            tl.to('#about .word', {
                opacity: 1, y: 0, duration: 0.4, stagger: 0.015, ease: 'power2.out'
            }, '-=0.2');

            // 时钟和菜单触发按钮
            tl.fromTo(elements.floatingClock, { opacity: 0, y: -20, scale: 0.8 }, 
                { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'back.out(1.5)' }, '-=0.2');
            tl.fromTo(elements.drawerTrigger, { opacity: 0, scale: 0, rotation: -180 }, 
                { opacity: 1, scale: 1, rotation: 0, duration: 0.5, ease: 'back.out(1.5)' }, '-=0.3');

            // 标题持续动画
            tl.add(() => {
                gsap.to('#title .char', {
                    y: 'random(-6, 0)',
                    rotation: 'random(-2, 2)',
                    duration: 'random(2, 3)',
                    ease: 'sine.inOut',
                    repeat: -1,
                    yoyo: true,
                    stagger: { each: 0.08, from: 'random' }
                });
            }, '+=0.2');

            // 显示粒子
            tl.add(() => revealShapesGradually(), '+=0.2');
        }

        // ========== 时钟 ==========
        function updateClock() {
            const now = new Date();
            const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
            const date = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][now.getDay()]}`;
            elements.floatingClockTime.textContent = time;
            elements.floatingClockDate.textContent = date;
            elements.panelClockTime.textContent = time;
            elements.panelClockDate.textContent = date;
        }

        // ========== 技能树 ==========
        function animateSkillBars() {
            document.querySelectorAll('.skill-fill').forEach((fill, i) => {
                gsap.to(fill, { width: fill.getAttribute('data-width') + '%', duration: 1.2, ease: 'power3.out', delay: i * 0.15 });
            });
        }

        // ========== 留言板 ==========
        let messages = [];
        function loadMessages() {
            const saved = localStorage.getItem('guestbook');
            messages = saved ? JSON.parse(saved) : [
                { text: '欢迎来到心诉哇的小窝！🎉', time: getTimeString(), id: Date.now() - 3600000 },
                { text: '这里会分享一些有趣的小项目~', time: getTimeString(), id: Date.now() - 7200000 }
            ];
            renderMessages();
        }
        function getTimeString() {
            const d = new Date();
            return `${d.getMonth()+1}月${d.getDate()}日 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }
        function saveMessages() { localStorage.setItem('guestbook', JSON.stringify(messages)); }
        function renderMessages() {
            elements.messagesList.innerHTML = '';
            messages.slice().reverse().forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message-item';
                div.innerHTML = `<div class="message-text">${escapeHtml(msg.text)}</div><div class="message-meta"><span>✨</span> <span>${msg.time}</span></div>`;
                elements.messagesList.appendChild(div);
            });
        }
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function addMessage(text) {
            if (!text.trim()) return;
            messages.push({ text: text.trim(), time: getTimeString(), id: Date.now() });
            saveMessages();
            renderMessages();
            elements.messageInput.value = '';
        }

        // ========== 2048游戏 ==========
        let game2048Grid = [];
        let game2048Score = 0;
        let game2048Active = false;

        function initGame2048() {
            game2048Grid = Array(4).fill(null).map(() => Array(4).fill(0));
            game2048Score = 0;
            elements.game2048Score.textContent = '0';
            
            elements.game2048Grid.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const cell = document.createElement('div');
                cell.className = 'game2048-grid-cell';
                elements.game2048Grid.appendChild(cell);
            }
            
            elements.game2048TileContainer.innerHTML = '';
            addRandomTile();
            addRandomTile();
            renderTiles();
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (game2048Grid[r][c] === 0) {
                        emptyCells.push({ r, c });
                    }
                }
            }
            if (emptyCells.length > 0) {
                const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                game2048Grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function renderTiles() {
            elements.game2048TileContainer.innerHTML = '';
            const containerSize = elements.game2048TileContainer.clientWidth;
            const gap = 10;
            const tileSize = (containerSize - gap * 3) / 4;
            
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const value = game2048Grid[r][c];
                    if (value > 0) {
                        const tile = document.createElement('div');
                        tile.className = `game2048-tile tile-${value > 2048 ? 'super' : value}`;
                        tile.textContent = value;
                        tile.style.width = `${tileSize}px`;
                        tile.style.height = `${tileSize}px`;
                        tile.style.left = `${c * (tileSize + gap)}px`;
                        tile.style.top = `${r * (tileSize + gap)}px`;
                        elements.game2048TileContainer.appendChild(tile);
                    }
                }
            }
        }

        function moveLeft() {
            let moved = false;
            for (let r = 0; r < 4; r++) {
                const row = game2048Grid[r].filter(v => v !== 0);
                const newRow = [];
                for (let i = 0; i < row.length; i++) {
                    if (i + 1 < row.length && row[i] === row[i + 1]) {
                        newRow.push(row[i] * 2);
                        game2048Score += row[i] * 2;
                        i++;
                        moved = true;
                    } else {
                        newRow.push(row[i]);
                    }
                }
                while (newRow.length < 4) newRow.push(0);
                for (let c = 0; c < 4; c++) {
                    if (game2048Grid[r][c] !== newRow[c]) moved = true;
                    game2048Grid[r][c] = newRow[c];
                }
            }
            return moved;
        }

        function moveRight() {
            let moved = false;
            for (let r = 0; r < 4; r++) {
                const row = game2048Grid[r].filter(v => v !== 0);
                const newRow = [];
                for (let i = row.length - 1; i >= 0; i--) {
                    if (i - 1 >= 0 && row[i] === row[i - 1]) {
                        newRow.unshift(row[i] * 2);
                        game2048Score += row[i] * 2;
                        i--;
                        moved = true;
                    } else {
                        newRow.unshift(row[i]);
                    }
                }
                while (newRow.length < 4) newRow.unshift(0);
                for (let c = 0; c < 4; c++) {
                    if (game2048Grid[r][c] !== newRow[c]) moved = true;
                    game2048Grid[r][c] = newRow[c];
                }
            }
            return moved;
        }

        function moveUp() {
            let moved = false;
            for (let c = 0; c < 4; c++) {
                const col = [];
                for (let r = 0; r < 4; r++) if (game2048Grid[r][c] !== 0) col.push(game2048Grid[r][c]);
                const newCol = [];
                for (let i = 0; i < col.length; i++) {
                    if (i + 1 < col.length && col[i] === col[i + 1]) {
                        newCol.push(col[i] * 2);
                        game2048Score += col[i] * 2;
                        i++;
                        moved = true;
                    } else {
                        newCol.push(col[i]);
                    }
                }
                while (newCol.length < 4) newCol.push(0);
                for (let r = 0; r < 4; r++) {
                    if (game2048Grid[r][c] !== newCol[r]) moved = true;
                    game2048Grid[r][c] = newCol[r];
                }
            }
            return moved;
        }

        function moveDown() {
            let moved = false;
            for (let c = 0; c < 4; c++) {
                const col = [];
                for (let r = 0; r < 4; r++) if (game2048Grid[r][c] !== 0) col.push(game2048Grid[r][c]);
                const newCol = [];
                for (let i = col.length - 1; i >= 0; i--) {
                    if (i - 1 >= 0 && col[i] === col[i - 1]) {
                        newCol.unshift(col[i] * 2);
                        game2048Score += col[i] * 2;
                        i--;
                        moved = true;
                    } else {
                        newCol.unshift(col[i]);
                    }
                }
                while (newCol.length < 4) newCol.unshift(0);
                for (let r = 0; r < 4; r++) {
                    if (game2048Grid[r][c] !== newCol[r]) moved = true;
                    game2048Grid[r][c] = newCol[r];
                }
            }
            return moved;
        }

        function checkGameOver() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (game2048Grid[r][c] === 0) return false;
                    if (c < 3 && game2048Grid[r][c] === game2048Grid[r][c + 1]) return false;
                    if (r < 3 && game2048Grid[r][c] === game2048Grid[r + 1][c]) return false;
                }
            }
            return true;
        }

        function handleGame2048Keydown(e) {
            if (!game2048Active) return;
            let moved = false;
            if (e.key === 'ArrowUp') { e.preventDefault(); moved = moveUp(); }
            else if (e.key === 'ArrowDown') { e.preventDefault(); moved = moveDown(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); moved = moveLeft(); }
            else if (e.key === 'ArrowRight') { e.preventDefault(); moved = moveRight(); }
            
            if (moved) {
                addRandomTile();
                elements.game2048Score.textContent = game2048Score;
                renderTiles();
                if (checkGameOver()) {
                    setTimeout(() => alert('游戏结束！分数: ' + game2048Score), 100);
                }
            }
        }

        let game2048TouchStartX = 0;
        let game2048TouchStartY = 0;
        function handleGame2048TouchStart(e) {
            if (!game2048Active) return;
            game2048TouchStartX = e.touches[0].clientX;
            game2048TouchStartY = e.touches[0].clientY;
        }

        function handleGame2048TouchEnd(e) {
            if (!game2048Active) return;
            const dx = e.changedTouches[0].clientX - game2048TouchStartX;
            const dy = e.changedTouches[0].clientY - game2048TouchStartY;
            
            let moved = false;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 50) moved = moveRight();
                else if (dx < -50) moved = moveLeft();
            } else {
                if (dy > 50) moved = moveDown();
                else if (dy < -50) moved = moveUp();
            }
            
            if (moved) {
                addRandomTile();
                elements.game2048Score.textContent = game2048Score;
                renderTiles();
                if (checkGameOver()) {
                    setTimeout(() => alert('游戏结束！分数: ' + game2048Score), 100);
                }
            }
        }

        // ========== 抽屉菜单 ==========
        function openDrawer() {
            isDrawerOpen = true;
            gsap.to(elements.drawerOverlay, { opacity: 1, duration: 0.3, ease: 'power2.out', onStart: () => elements.drawerOverlay.classList.add('visible') });
            gsap.to(elements.drawerMenu, { x: 0, duration: 0.4, ease: 'power3.out' });
        }

        function closeDrawer() {
            isDrawerOpen = false;
            gsap.to(elements.drawerOverlay, { opacity: 0, duration: 0.25, ease: 'power2.in', onComplete: () => elements.drawerOverlay.classList.remove('visible') });
            gsap.to(elements.drawerMenu, { x: -280, duration: 0.35, ease: 'power3.in' });
        }

        function openExternal(url) {
            closeDrawer();
            const tl = gsap.timeline();
            tl.to('.page-home', { opacity: 0, scale: 0.95, duration: 0.4, ease: 'power2.in' });
            tl.to('body', { backgroundColor: '#fdfcfa', duration: 0.3 }, '-=0.2');
            tl.call(() => { window.location.href = url; });
        }

        function openPanel(panelName) {
            closeDrawer();
            closePanel();
            setTimeout(() => {
                const panel = document.getElementById(panelName + 'Panel');
                if (panel) {
                    gsap.to(panel, { opacity: 1, duration: 0.3, ease: 'power2.out', onStart: () => panel.classList.add('visible') });
                    gsap.fromTo(panel.querySelector('.panel-content'), { scale: 0.9, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: 'back.out(1.5)', delay: 0.1 });
                    if (panelName === 'skills') setTimeout(animateSkillBars, 400);
                    if (panelName === 'game2048') {
                        game2048Active = true;
                        setTimeout(() => {
                            initGame2048();
                            document.addEventListener('keydown', handleGame2048Keydown);
                            const container = document.getElementById('game2048Panel');
                            container.addEventListener('touchstart', handleGame2048TouchStart, { passive: false });
                            container.addEventListener('touchend', handleGame2048TouchEnd, { passive: false });
                        }, 300);
                    }
                }
            }, 250);
        }

        function closePanel() {
            game2048Active = false;
            document.removeEventListener('keydown', handleGame2048Keydown);
            document.querySelectorAll('.panel-overlay').forEach(panel => {
                gsap.to(panel, { opacity: 0, duration: 0.2, ease: 'power2.in', onComplete: () => panel.classList.remove('visible') });
            });
        }

        // ========== 事件监听 ==========
        function setupEventListeners() {
            window.addEventListener('resize', resizeCanvas);

            // 抽屉菜单
            elements.drawerTrigger.addEventListener('click', () => isDrawerOpen ? closeDrawer() : openDrawer());
            elements.drawerOverlay.addEventListener('click', closeDrawer);
            elements.drawerItems.forEach(item => {
                if (item.classList.contains('drawer-external')) {
                    item.addEventListener('click', () => openExternal(item.getAttribute('data-url')));
                } else {
                    item.addEventListener('click', () => openPanel(item.getAttribute('data-panel')));
                }
            });

            // 面板
            elements.panelsContainer.addEventListener('click', e => {
                if (e.target.classList.contains('panel-overlay')) closePanel();
            });
            document.querySelectorAll('.panel-close').forEach(btn => {
                btn.addEventListener('click', closePanel);
            });

            // 键盘
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') { closePanel(); if (isDrawerOpen) closeDrawer(); }
            });

            // 留言板
            elements.sendBtn.addEventListener('click', () => addMessage(elements.messageInput.value));
            elements.messageInput.addEventListener('keypress', e => { if (e.key === 'Enter') addMessage(elements.messageInput.value); });
            
            // 2048游戏重新开始
            elements.game2048NewBtn.addEventListener('click', initGame2048);
        }

        // ========== 初始化 ==========
        function init() {
            initCanvas();
            setupEventListeners();
            animateCanvas();
            updateClock();
            setInterval(updateClock, 1000);
            loadMessages();
            initializeTitleAnimation();
            initializeAboutAnimation();

            // 主页入场动画
            animateHomePageIn();
        }

        init();
    </script>
</body>
</html>
