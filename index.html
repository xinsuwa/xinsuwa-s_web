<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心诉哇的小窝</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #fdfcfa;
            --text: #2d2a26;
            --muted: #8b8680;
            --accent: #d4a574;
            --warm: #e8c098;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1816;
                --text: #f0ebe3;
                --muted: #a8a29a;
                --accent: #d4a574;
                --warm: #c4956a;
            }
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Welcome Page */
        .welcome-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background 1.2s ease-out, opacity 0.5s ease 1.4s, visibility 0.5s ease 1.4s;
        }

        .welcome-page.transitioning {
            background: transparent;
        }

        .welcome-page.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .avatar-container {
            cursor: pointer;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 101;
        }

        .avatar-container:hover {
            transform: scale(1.05);
        }

        .avatar-container:hover .avatar-glow {
            transform: scale(1.2);
            opacity: 0.6;
        }

        .avatar-container.transitioning {
            opacity: 0;
            transform: scale(0.8);
            transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
        }

        .avatar-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--warm) 0%, transparent 70%);
            transform: translate(-50%, -50%) scale(1);
            opacity: 0.3;
            animation: glowPulse 3s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes glowPulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.5;
            }
        }

        .avatar-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            border: 1px solid var(--warm);
            transform: translate(-50%, -50%);
            animation: ringFloat 4s ease-in-out infinite;
            z-index: 0;
        }

        .avatar-ring:nth-child(1) {
            width: 200px;
            height: 200px;
            animation-delay: 0s;
        }

        .avatar-ring:nth-child(2) {
            width: 240px;
            height: 240px;
            animation-delay: 1s;
            opacity: 0.5;
        }

        .avatar-ring:nth-child(3) {
            width: 280px;
            height: 280px;
            animation-delay: 2s;
            opacity: 0.3;
        }

        @keyframes ringFloat {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.05);
                opacity: 0.5;
            }
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid var(--warm);
            object-fit: cover;
            position: relative;
            z-index: 2;
        }

        /* 漂浮装饰元素 */
        .floating-decor {
            position: absolute;
            opacity: 0.4;
            animation: floatDecor 6s ease-in-out infinite;
            z-index: 99;
        }

        .floating-decor.star {
            width: 20px;
            height: 20px;
        }

        .floating-decor.heart {
            width: 18px;
            height: 18px;
        }

        .floating-decor:nth-child(1) {
            top: 15%;
            left: 20%;
            animation-delay: 0s;
        }

        .floating-decor:nth-child(2) {
            top: 25%;
            right: 25%;
            animation-delay: 1s;
        }

        .floating-decor:nth-child(3) {
            bottom: 30%;
            left: 15%;
            animation-delay: 2s;
        }

        .floating-decor:nth-child(4) {
            bottom: 20%;
            right: 20%;
            animation-delay: 3s;
        }

        .floating-decor:nth-child(5) {
            top: 40%;
            left: 10%;
            animation-delay: 4s;
        }

        .floating-decor:nth-child(6) {
            top: 60%;
            right: 12%;
            animation-delay: 5s;
        }

        @keyframes floatDecor {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.4;
            }
            50% {
                transform: translateY(-15px) rotate(10deg);
                opacity: 0.6;
            }
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--warm);
            background: transparent;
            animation: ripple 1s ease-out forwards;
            pointer-events: none;
        }

        @keyframes ripple {
            0% {
                width: 10px;
                height: 10px;
                opacity: 0.8;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
        }

        .welcome-name {
            margin-top: 24px;
            font-family: 'Noto Serif SC', serif;
            font-size: 2rem;
            font-weight: 600;
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            opacity: 1;
            transform: translateY(0);
            z-index: 101;
        }

        .welcome-name.transitioning {
            opacity: 0;
            transform: translateY(-30px);
        }

        /* Canvas background */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        /* Header */
        header {
            margin-bottom: 48px;
            position: relative;
        }

        .name {
            font-family: 'Noto Serif SC', serif;
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            line-height: 1.2;
            display: inline-block;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .name.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .name .char {
            display: inline-block;
            transform-origin: center bottom;
            animation: charFloat 3s ease-in-out infinite;
        }

        .name .char:nth-child(1) { animation-delay: 0s; }
        .name .char:nth-child(2) { animation-delay: 0.1s; }
        .name .char:nth-child(3) { animation-delay: 0.2s; }
        .name .char:nth-child(4) { animation-delay: 0.3s; }
        .name .char:nth-child(5) { animation-delay: 0.4s; }
        .name .char:nth-child(6) { animation-delay: 0.5s; }

        @keyframes charFloat {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-5px) rotate(1deg);
            }
        }

        .tagline {
            font-size: 1.1rem;
            color: var(--muted);
            font-weight: 400;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease 0.2s, transform 0.8s ease 0.2s;
        }

        .tagline.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* About */
        .about {
            margin-bottom: 56px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease 0.4s, transform 0.8s ease 0.4s;
        }

        .about.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .about-text {
            font-size: 1rem;
            color: var(--text);
            line-height: 1.8;
        }

        .about-text .word {
            display: inline-block;
            opacity: 0;
            animation: wordReveal 0.6s ease-out forwards;
        }

        /* Links */
        .links {
            display: flex;
            justify-content: center;
            gap: 16px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease 0.6s, transform 0.8s ease 0.6s;
        }

        .links.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .link-item {
            font-size: 0.95rem;
            color: var(--text);
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 100px;
            border: 1px solid var(--warm);
            background: var(--bg);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--accent);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .link-item:hover::before {
            transform: translateY(0);
        }

        .link-item:hover {
            color: #fff;
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes wordReveal {
            from {
                opacity: 0;
                transform: translateY(10px);
                filter: blur(4px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .content {
                padding: 24px;
            }

            .name {
                font-size: 2.2rem;
            }

            .links {
                flex-wrap: wrap;
            }

            .link-item {
                padding: 10px 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Welcome Page -->
    <div class="welcome-page" id="welcomePage">
        <!-- 漂浮装饰 -->
        <svg class="floating-decor star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9"/>
        </svg>
        <svg class="floating-decor heart" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        <svg class="floating-decor star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9"/>
        </svg>
        <svg class="floating-decor heart" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        <svg class="floating-decor star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9"/>
        </svg>
        <svg class="floating-decor heart" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        
        <div class="avatar-container" id="avatarContainer">
            <!-- 光环装饰 -->
            <div class="avatar-ring"></div>
            <div class="avatar-ring"></div>
            <div class="avatar-ring"></div>
            <div class="avatar-glow"></div>
            <img class="avatar" id="avatar" src="avatar.png" alt="头像">
        </div>
        <div class="welcome-name" id="welcomeName">心诉哇的小窝</div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="content">
        <div class="container">
            <header>
                <h1 class="name" id="title">心诉哇的小窝</h1>
                <p class="tagline" id="tagline">(*^▽^*)</p>
            </header>

            <section class="about" id="about">
                <p class="about-text" id="aboutText">这里是我分享和展示各种小项目的地方。一些实验、一些想法、一些玩物。</p>
            </section>

            <section class="links" id="links">
                <a href="#" class="link-item">小玩意儿</a>
                <a href="#" class="link-item">GitHub</a>
                <a href="#" class="link-item">关于</a>
            </section>
        </div>
    </div>

    <script>
        /**
         * 心诉哇的小窝 - 个人主页
         * 部署到 GitHub Pages 的友好代码结构
         */

        // DOM 元素引用
        const elements = {
            welcomePage: document.getElementById('welcomePage'),
            avatarContainer: document.getElementById('avatarContainer'),
            avatar: document.getElementById('avatar'),
            welcomeName: document.getElementById('welcomeName'),
            title: document.getElementById('title'),
            tagline: document.getElementById('tagline'),
            about: document.getElementById('about'),
            aboutText: document.getElementById('aboutText'),
            links: document.getElementById('links'),
            canvas: document.getElementById('canvas')
        };

        // 初始化标题字符动画
        function initializeTitleAnimation() {
            const titleText = elements.title.textContent;
            elements.title.innerHTML = '';
            titleText.split('').forEach((char, index) => {
                const span = document.createElement('span');
                span.className = 'char';
                span.textContent = char;
                elements.title.appendChild(span);
            });
        }

        // 初始化关于文本动画
        function initializeAboutAnimation() {
            const aboutTextContent = elements.aboutText.textContent;
            elements.aboutText.innerHTML = '';
            aboutTextContent.split('').forEach((char, index) => {
                const span = document.createElement('span');
                span.className = 'word';
                span.textContent = char === ' ' ? '\u00A0' : char;
                span.style.animationDelay = `${index * 0.02}s`;
                elements.aboutText.appendChild(span);
            });
        }

        // 创建水波纹效果
        function createRipple(container) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            container.appendChild(ripple);
            
            setTimeout(() => {
                ripple.remove();
            }, 1000);
        }

        // 显示主页内容
        function showMainContent() {
            // 按顺序显示各个部分
            setTimeout(() => {
                elements.title.classList.add('visible');
            }, 800);

            setTimeout(() => {
                elements.tagline.classList.add('visible');
            }, 1000);

            setTimeout(() => {
                elements.about.classList.add('visible');
            }, 1200);

            setTimeout(() => {
                elements.links.classList.add('visible');
            }, 1400);
        }

        // 处理头像点击事件
        function handleAvatarClick() {
            // 创建水波纹
            createRipple(elements.avatarContainer);

            // 开始过渡动画
            requestAnimationFrame(() => {
                elements.welcomePage.classList.add('transitioning');
                elements.avatarContainer.classList.add('transitioning');
                elements.welcomeName.classList.add('transitioning');
            });

            // 显示主页内容
            showMainContent();

            // 完全隐藏欢迎页
            setTimeout(() => {
                elements.welcomePage.classList.add('hidden');
            }, 2000);
        }

        // Canvas 粒子背景
        const canvasState = {
            ctx: null,
            shapes: [],
            mouseX: 0,
            mouseY: 0,
            targetMouseX: 0,
            targetMouseY: 0
        };

        class Shape {
            constructor() {
                this.reset();
            }

            reset() {
                this.type = Math.random();
                this.x = Math.random() * elements.canvas.width;
                this.y = Math.random() * elements.canvas.height;
                this.size = Math.random() * 50 + 25;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.008;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.08 + 0.03;
            }

            update() {
                const dx = canvasState.targetMouseX - elements.canvas.width / 2;
                const dy = canvasState.targetMouseY - elements.canvas.height / 2;
                const influenceX = dx * 0.00005 * this.size;
                const influenceY = dy * 0.00005 * this.size;

                this.x += this.speedX + influenceX;
                this.y += this.speedY + influenceY;
                this.rotation += this.rotationSpeed;

                if (this.x < -this.size * 2) this.x = elements.canvas.width + this.size;
                if (this.x > elements.canvas.width + this.size * 2) this.x = -this.size;
                if (this.y < -this.size * 2) this.y = elements.canvas.height + this.size;
                if (this.y > elements.canvas.height + this.size * 2) this.y = -this.size;
            }

            draw() {
                canvasState.ctx.save();
                canvasState.ctx.translate(this.x, this.y);
                canvasState.ctx.rotate(this.rotation);
                canvasState.ctx.globalAlpha = this.opacity;
                canvasState.ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
                canvasState.ctx.lineWidth = 1.5;

                if (this.type < 0.25) {
                    this.drawHouse();
                } else if (this.type < 0.5) {
                    this.drawStar();
                } else if (this.type < 0.75) {
                    this.drawCircle();
                } else {
                    this.drawHeart();
                }

                canvasState.ctx.restore();
            }

            drawHouse() {
                canvasState.ctx.beginPath();
                canvasState.ctx.moveTo(-this.size / 2, this.size / 3);
                canvasState.ctx.lineTo(-this.size / 2, -this.size / 6);
                canvasState.ctx.lineTo(0, -this.size / 2);
                canvasState.ctx.lineTo(this.size / 2, -this.size / 6);
                canvasState.ctx.lineTo(this.size / 2, this.size / 3);
                canvasState.ctx.closePath();
                canvasState.ctx.stroke();
            }

            drawStar() {
                canvasState.ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                    const x = Math.cos(angle) * this.size / 2;
                    const y = Math.sin(angle) * this.size / 2;
                    if (i === 0) canvasState.ctx.moveTo(x, y);
                    else canvasState.ctx.lineTo(x, y);
                }
                canvasState.ctx.closePath();
                canvasState.ctx.stroke();
            }

            drawCircle() {
                canvasState.ctx.beginPath();
                canvasState.ctx.arc(0, 0, this.size / 2.5, 0, Math.PI * 2);
                canvasState.ctx.stroke();
            }

            drawHeart() {
                canvasState.ctx.beginPath();
                canvasState.ctx.moveTo(0, this.size / 6);
                canvasState.ctx.bezierCurveTo(-this.size / 2, -this.size / 4, -this.size / 2, -this.size / 2, 0, -this.size / 4);
                canvasState.ctx.bezierCurveTo(this.size / 2, -this.size / 2, this.size / 2, -this.size / 4, 0, this.size / 6);
                canvasState.ctx.stroke();
            }
        }

        function resizeCanvas() {
            elements.canvas.width = window.innerWidth;
            elements.canvas.height = window.innerHeight;
        }

        function initCanvas() {
            canvasState.ctx = elements.canvas.getContext('2d');
            resizeCanvas();
            
            const shapeCount = Math.floor((elements.canvas.width * elements.canvas.height) / 35000);
            for (let i = 0; i < shapeCount; i++) {
                canvasState.shapes.push(new Shape());
            }
        }

        function animateCanvas() {
            canvasState.mouseX += (canvasState.targetMouseX - canvasState.mouseX) * 0.05;
            canvasState.mouseY += (canvasState.targetMouseY - canvasState.mouseY) * 0.05;

            canvasState.ctx.clearRect(0, 0, elements.canvas.width, elements.canvas.height);
            canvasState.shapes.forEach(shape => {
                shape.update();
                shape.draw();
            });
            requestAnimationFrame(animateCanvas);
        }

        // 事件监听
        function setupEventListeners() {
            elements.avatarContainer.addEventListener('click', handleAvatarClick);

            window.addEventListener('resize', resizeCanvas);

            document.addEventListener('mousemove', (e) => {
                canvasState.targetMouseX = e.clientX;
                canvasState.targetMouseY = e.clientY;
            });
        }

        // 初始化应用
        function init() {
            initializeTitleAnimation();
            initializeAboutAnimation();
            initCanvas();
            setupEventListeners();
            animateCanvas();
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
